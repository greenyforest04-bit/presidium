# Presidium Messenger — cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/
# Compatible with cargo-deny 0.14+

# ── Dependency graph ──────────────────────────────────────
[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ── Advisories ────────────────────────────────────────────
# All advisories are denied by default.
# Use `ignore` to suppress specific advisory IDs.
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

# ── Licenses ──────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true
registries = []

# ── Bans ──────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# ── Sources ───────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
