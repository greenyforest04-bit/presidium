# Presidium Messenger — Rust formatting configuration
# See: https://rust-lang.github.io/rustfmt/
#
# Only stable options are used to ensure CI compatibility.
# Unstable/nightly-only options are intentionally omitted.

# Maximum line width
max_width = 100

# Use small heuristics for various constructs
use_small_heuristics = "Max"

# Import ordering
reorder_imports = true

# Function arguments layout
fn_params_layout = "Tall"

# Chain width for method chaining
chain_width = 60

# Single line if-else expressions
single_line_if_else_max_width = 50

# Edition
edition = "2021"

# ──────────────────────────────────────────────────────────
# The following options are unstable (require nightly rustfmt)
# and cause CI failures on stable. They are commented out
# until we either switch to nightly or they become stable.
# ──────────────────────────────────────────────────────────
# imports_granularity = "Module"        # unstable — rename: import_granularity
# group_imports = "StdExternalCrate"    # unstable
# wrap_comments = true                  # unstable
# format_strings = false                # unstable
# where_single_line = false             # removed in recent rustfmt
# struct_lit_single_line = false        # not a valid config key
# force_uniform_combining = true        # unstable
# format_code_in_doc_comments = true    # unstable
