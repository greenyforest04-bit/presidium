# Presidium Messenger — Rust formatting configuration
# See: https://rust-lang.github.io/rustfmt/

# Maximum line width
max_width = 100

# Use small heuristics for various constructs
use_small_heuristics = "Max"

# Import grouping and ordering
imports_granularity = "Module"
group_imports = "StdExternalCrate"
reorder_imports = true

# Function arguments layout
fn_params_layout = "Tall"

# Where clause style
where_single_line = false

# Struct literal style
struct_lit_single_line = false

# Force uniform formatting
force_uniform_combining = true

# Format code in doc comments
format_code_in_doc_comments = true

# Wrap comments to fit within max_width
wrap_comments = true

# Format string literals that are too long
format_strings = false

# Chain width for method chaining
chain_width = 60

# Single line if-else expressions
single_line_if_else_max_width = 50

# Edition
edition = "2021"
